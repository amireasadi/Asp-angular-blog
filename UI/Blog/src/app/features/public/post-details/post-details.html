<div class="container">
  <div class="my-5">
    @if (isLoading()) {
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    } @else {
    <div class="col-12 col-md-8 col-1g-6 mx-auto">
      <img class="img-fluid rounded-3" [src]="post()?.featuredImageUrl" [title]="post()?.title" />
      <h1 class="mt-4 fw-bold">{{ post()?.title }}</h1>
      <div class="d-flex justify-content-between mt-4">
        <span>{{ post()?.author }}</span>
        <span>{{ post()?.publishedDate | date : 'dd-MM-yyyy' }}</span>
      </div>

      @if (post()?.categories) {
      <div class="mt-4">
        @for (category of post()?.categories; track category.id) {
        <span class="badge bg-secondary me-2">{{ category.name }}</span>
        }
      </div>
      }
      <div class="mt-4 blog-content">
        <markdown [data]="post()?.content"></markdown>
      </div>
    </div>
    }
  </div>
</div>
