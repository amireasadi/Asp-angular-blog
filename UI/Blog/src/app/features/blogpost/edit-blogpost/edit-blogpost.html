<div class="container">
  <h1 class="fw-bold">ویرایش نوشته</h1>
  <form [formGroup]="editBlogpostFormGroup" class="mt-3" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">عنوان</label>
      <input type="text" class="form-control" formControlName="title" />
    </div>

    <div class="mb-3">
      <label class="form-label">توضیحات کوتاه</label>
      <input type="text" class="form-control" formControlName="shortDescription" />
    </div>

    <div class="mb-3">
      <label class="form-label">پیوند</label>
      <input type="text" class="form-control" formControlName="urlHandle" />
    </div>

    <div class="mb-3">
      <div class="d-flex flex-row">
        <div class="col-6 p-2">
          <label class="form-label">محتوا</label>
          <textarea class="form-control" formControlName="content" rows="5"></textarea>
        </div>
        <div class="col-6 p-2" style="max-height: 350px; overflow-y: scroll">
          <markdown [data]="editBlogpostFormGroup.controls.content.getRawValue()"></markdown>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">تصویر شاخص</label>
      @if(editBlogpostFormGroup.controls.featuredImageUrl.value) {
      <img
        [src]="editBlogpostFormGroup.controls.featuredImageUrl.value"
        class="my-2"
        style="height: 100px; display: block"
      />
      }
      <input type="text" class="form-control" ” formControlName="featuredImageUrl" />
      <button
        type="button"
        class="btn btn-secondary mt-3"
        data-bs-toggle="modal"
        data-bs-target="#imageSelecotrModal"
      >
        باگزاری تصویر
      </button>
    </div>

    <div class="mb-3">
      <label class="form-label">نویسنده</label>
      <input type="text" class="form-control" formControlName="author" />
    </div>
    <div class="mb-3">
      <label class="form-label">تاریخ انتشار</label>
      <input type="date" class="form-control" formControlName="publishedDate" />
    </div>
    <div class="mb-3">
      <label class="form-label">دسته بندی</label>
      <select name="categories" class="form-control" multiple formControlName="categories">
        @for (category of categoriesResult(); track category.id ) {
        <option [value]="category.id">{{category.name}}</option>
        }
      </select>
    </div>
    <div class="mb-3">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          id="isVisible"
          formControlName="isVisible"
        />
        <label class="form-check-label" for="isVisible">فعال</label>
      </div>
    </div>
    <div class="mb-3 d-flex gap-5">
      <button class="btn btn-primary">ذخیره</button>
      <button class="btn btn-danger" (click)="deletePost()">حذف</button>
    </div>
  </form>
</div>

<app-image-selector></app-image-selector>
