<div class="container">
  <h1 class="mt-3 fw-bold">دسته بندی ها</h1>
  <div class="d-flex justify-content-end mt-3">
    <a class="btn btn-primary" [routerLink]="['/admin/category/add']">اضافه کردن</a>
  </div>
  <div>
    <table class="table table-bordered mt-3">
      <thead>
        <tr>
          <th>شناسه</th>
          <th>نام</th>
          <th>پیوند</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for(category of value(); track category.id){
        <tr>
          <td>{{category.id}}</td>
          <td>{{category.name}}</td>
          <td>{{category.urlHandle}}</td>
          <td class="d-flex justify-content-center items-center">
            <a class="btn btn-primary" [routerLink]="['/admin/categories/edit', category.id]"
              >ویرایش</a
            >
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
