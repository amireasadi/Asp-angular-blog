<div
  class="modal fade"
  id="imageSelecotrModal"
  tabindex="-1"
  aria-labelledby="imageSelector"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content">
      <!-- Header -->
      <div class="modal-header border-0 pb-0">
        <h1 class="modal-title fs-4 fw-bold" id="imageSelector">
          <i class="bi bi-image me-2"></i>بارگزاری تصویر
        </h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body -->
      <div class="modal-body pt-3">
        <!-- Upload Form -->
        <form
          id="image-selector-form"
          [formGroup]="imageSelectorFormGroup"
          (ngSubmit)="onSubmit()"
          class="bg-light p-4 rounded-3 mb-4"
        >
          <div class="row g-3">
            <!-- File Input -->
            <div class="col-12">
              <label class="form-label fw-semibold">فایل تصویر</label>
              <input
                type="file"
                class="form-control"
                formControlName="file"
                (change)="onFileSelected($event)"
                accept=".jpg,.jpeg,.png,.webp"
              />
              <small class="text-muted">فرمت‌های مجاز: jpg, jpeg, png, webp</small>
            </div>

            <!-- Image Name -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">نام عکس</label>
              <input
                type="text"
                class="form-control"
                placeholder="نام عکس را وارد کنید"
                formControlName="imageName"
              />
            </div>

            <!-- Title -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">عنوان</label>
              <input
                type="text"
                class="form-control"
                placeholder="عنوان تصویر"
                formControlName="title"
              />
            </div>

            <!-- Submit Button -->
            <div class="col-12">
              <button
                form="image-selector-form"
                type="submit"
                class="btn btn-dark px-4"
                [disabled]="imageSelectorFormGroup.invalid"
              >
                <i class="bi bi-upload me-2"></i>بارگزاری
              </button>
            </div>
          </div>
        </form>

        <!-- Gallery Section -->
        <div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0"><i class="bi bi-images me-2"></i>گالری</h6>
            <span class="badge bg-secondary">{{ images()?.length }} تصویر</span>
          </div>

          <!-- Loading State -->
          @if(isLoading()) {
          <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">در حال بارگزاری</span>
            </div>
            <p class="text-muted mt-2">در حال بارگزاری تصاویر...</p>
          </div>
          }
          <!-- Gallery Grid -->
          @else {
          <div class="row g-2">
            @for(image of images(); track image.id) {
            <div class="col-4">
              <div
                class="image-card position-relative rounded-3 overflow-hidden cursor-pointer"
                [class.selected]="selectedImage?.id === image.id"
                (click)="onSelectImage(image)"
              >
                <img
                  [src]="image.url"
                  [alt]="image.title || 'تصویر'"
                  class="w-100 h-100 object-fit-cover"
                  style="aspect-ratio: 1/1"
                />

                <!-- Selection Overlay -->
                @if(selectedImage?.id === image.id) {
                <div class="selected-overlay">
                  <i class="bi bi-check-circle-fill text-white fs-1"></i>
                </div>
                } @else {
                <div class="hover-overlay">
                  <i class="bi bi-eye text-white fs-3"></i>
                </div>
                }
              </div>
            </div>
            }
          </div>
          }
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">بستن</button>
        <button
          (click)="onSetImage()"
          [attr.data-bs-dismiss]="selectedImage ? 'modal' : null"
          [disabled]="!selectedImage"
          type="button"
          class="btn btn-primary px-4"
        >
          <i class="bi bi-check2 me-2"></i>انتخاب
        </button>
      </div>
    </div>
  </div>
</div>
