<div
  class="modal fade"
  id="imageSelecotrModal"
  tabindex="-1"
  aria-labelledby="imageSelector"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="imageSelector">بارگزاری تصویر</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="image-selector-form" [formGroup]="imageSelectorFormGroup" (ngSubmit)="onSubmit()">
          <div class="mt-3">
            <input
              type="file"
              class="form-control"
              formControlName="file"
              (change)="onFileSelected($event)"
              accept=".jpg,.jpeg,.png,.webp"
            />
            <small>jpg,jpeg,png,webp</small>
          </div>
          <div class="mt-3">
            <input
              type="text"
              class="form-control"
              placeholder="نام عکس"
              formControlName="imageName"
            />
          </div>

          <div class="mt-3">
            <input type="text" class="form-control" placeholder="عنوان" formControlName="title" />
          </div>
        </form>

        <div class="my-5">
          <h6>پیش نمایش</h6>
          <div class="w-100 h-100 bg-secondary-subtle rounded-2"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
        <button form="image-selector-form" type="submit" class="btn btn-primary">بارگزاری</button>
      </div>
    </div>
  </div>
</div>
