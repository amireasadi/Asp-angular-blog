<div
  class="modal fade"
  id="imageSelecotrModal"
  tabindex="-1"
  aria-labelledby="imageSelector"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="imageSelector">بارگزاری تصویر</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="image-selector-form" [formGroup]="imageSelectorFormGroup" (ngSubmit)="onSubmit()">
          <div class="mt-3">
            <input
              type="file"
              class="form-control"
              formControlName="file"
              (change)="onFileSelected($event)"
              accept=".jpg,.jpeg,.png,.webp"
            />
            <small>jpg,jpeg,png,webp</small>
          </div>
          <div class="mt-3">
            <input
              type="text"
              class="form-control"
              placeholder="نام عکس"
              formControlName="imageName"
            />
          </div>

          <div class="mt-3">
            <input type="text" class="form-control" placeholder="عنوان" formControlName="title" />
          </div>
          <div class="mt-3">
            <button form="image-selector-form" type="submit" class="btn btn-primary">
              بارگزاری
            </button>
          </div>
        </form>

        <div class="my-5">
          <h6>گالری</h6>
          <div class="w-100 h-100 bg-secondary-subtle rounded-2">
            @if(isLoading()) {
            <div class="spinner-border" role="status">
              <span class="visually-hidden">در حال بارگزاری</span>
            </div>
            }@else{ @for(image of images(); track image.id){
            <img
              [src]="image.url"
              [alt]="image.title"
              class="g-col-4 object-fit-cover rounded-2 m-2"
              style="width: 130px; height: 130px"
            />
            } }
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">بستن</button>
        <button type="button" class="btn btn-primary">انتخاب</button>
      </div>
    </div>
  </div>
</div>
